<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SPARK</title>
</head>
<body style="background-color: #000000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <!-- Minimal black loading screen to match a clean launch look -->
    <div style="color: #ffffff; font-family: sans-serif; font-size: 16px; letter-spacing: 3px; font-weight: 300;">
        LOADING EXPERIENCE...
    </div>

    <script>
    // 1. ALL REPOSITORY ASSETS TO PRE-DOWNLOAD (HTML, CSS, AND IMAGES)
    const assetsToLoad = [
        // Core Styles and Structure
        'style.css',
        'splash.html',
        'home.html',
        'gallery.html',
        'content_ST2.html',
        'ais.html',
        'template.html',

        // All Images from your images folder
        'images/bg-high.jpg',
        'images/bg-low.jpg',
        'images/bg-med.jpg',
        'images/content2-colombo.jpg',
        'images/content2-commute.jpg',
        'images/content2-flight.jpg',
        'images/content2-hero.jpg',
        'images/content2-scale.jpg',
        'images/earth.png',
        'images/energy.png',
        'images/home-bg.jpg',
        'images/image1.jpg',
        'images/image2.jpg',
        'images/image3.jpg',
        'images/image4.jpg',
        'images/image5.jpg',
        'images/image6.jpg',
        'images/logo.png',
        'images/plant.png',
        'images/recycle.png',
        'images/sea.png',
        'images/splash-bg.jpg'
    ];

    let loadedCount = 0;

    // 2. REDIRECT TRIGGER (Runs only when the browser completely downloads everything)
    function launchWebsite() {
        window.location.href = "splash.html";
    }

    function checkProgress() {
        loadedCount++;
        if (loadedCount >= assetsToLoad.length) {
            launchWebsite();
        }
    }

    // 3. BACKGROUND DOWNLOAD ENGINE
    if (assetsToLoad.length === 0) {
        window.addEventListener('load', launchWebsite);
    } else {
        assetsToLoad.forEach(url => {
            if (url.endsWith('.html') || url.endsWith('.css')) {
                // Silently fetch web files and inject them directly into browser cache
                fetch(url).then(checkProgress).catch(checkProgress);
            } else {
                // Silently pull visual media files into browser cache memory
                const img = new Image();
                img.src = url;
                img.onload = checkProgress;
                img.onerror = checkProgress; // Prevents freezing if an asset name is missing
            }
        });
    }
    </script>
</body>
</html>
