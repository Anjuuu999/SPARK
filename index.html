<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SPARK</title>
</head>
<body style="background-color: #000000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden;">

    <!-- Visible Loading Elements -->
    <div style="color: #ffffff; font-size: 16px; letter-spacing: 4px; font-weight: 300; margin-bottom: 15px;">
        LOADING SPARK
    </div>
    
    <!-- Visual Progress Bar Container -->
    <div style="width: 200px; height: 2px; background-color: #222222; border-radius: 2px; overflow: hidden; position: relative;">
        <div id="progress-bar" style="width: 0%; height: 100%; background-color: #ffffff; transition: width 0.1s ease;"></div>
    </div>

    <!-- Live Counter -->
    <div id="progress-text" style="color: #666666; font-size: 12px; margin-top: 10px; letter-spacing: 1px;">0%</div>

    <!-- Hidden element container to force browser hardware rendering/caching -->
    <div id="cache-container" style="display: none !important; width: 0; height: 0; opacity: 0; visibility: hidden;"></div>

    <script>
    // Complete Asset List
    const assetsToLoad = [
        'style.css',
        'splash.html',
        'home.html',
        'gallery.html',
        'content_ST2.html',
        'ais.html',
        'template.html',
        'images/bg-high.jpg',
        'images/bg-low.jpg',
        'images/bg-med.jpg',
        'images/content2-colombo.jpg',
        'images/content2-commute.jpg',
        'images/content2-flight.jpg',
        'images/content2-hero.jpg',
        'images/content2-scale.jpg',
        'images/earth.png',
        'images/energy.png',
        'images/home-bg.jpg',
        'images/image1.jpg',
        'images/image2.jpg',
        'images/image3.jpg',
        'images/image4.jpg',
        'images/image5.jpg',
        'images/image6.jpg',
        'images/logo.png',
        'images/plant.png',
        'images/recycle.png',
        'images/sea.png',
        'images/splash-bg.jpg'
    ];

    let loadedCount = 0;
    const totalAssets = assetsToLoad.length;
    const container = document.getElementById('cache-container');

    function updateProgress() {
        loadedCount++;
        
        // Calculate percentages
        const percentage = Math.floor((loadedCount / totalAssets) * 100);
        
        // Update the visual loading screens
        document.getElementById('progress-bar').style.width = percentage + '%';
        document.getElementById('progress-text').innerText = percentage + '%';

        // Once 100% is reached, break out and launch
        if (loadedCount >= totalAssets) {
            setTimeout(() => {
                window.location.href = "splash.html";
            }, 300); // Tiny pause at 100% for smooth transition
        }
    }

    // Force absolute pre-rendering 
    assetsToLoad.forEach(url => {
        if (url.endsWith('.html')) {
            // Force browser to fetch text and create a hidden frame connection
            fetch(url, { cache: "reload" })
                .then(updateProgress)
                .catch(updateProgress);
        } else if (url.endsWith('.css')) {
            // Append stylesheets directly to memory
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = url;
            link.onload = updateProgress;
            link.onerror = updateProgress;
            container.appendChild(link);
        } else {
            // Create literal image nodes in DOM to enforce hard browser disk/memory caching
            const img = new Image();
            img.src = url;
            img.onload = updateProgress;
            img.onerror = updateProgress;
            container.appendChild(img);
        }
    });
    </script>
</body>
</html>
