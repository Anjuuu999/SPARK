<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>| SPARK | Welcome |</title>

    <meta http-equiv="refresh" content="4;url=home.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: 'Open Sans', Arial, sans-serif; }

        body {
            background: linear-gradient(rgba(30, 30, 30, 0.55), rgba(30, 30, 30, 0.55)),
                        url('images/splash-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .splash {
            max-width: 700px;
        }

        .logo-orbit {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 1.5rem;
        }
        .logo-orbit img {
            position: relative;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
            filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4));
        }
        .logo-orbit::before {
            content: '';
            position: absolute;
            inset: -14px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                transparent 230deg,
                rgba(58, 125, 68, 0.6) 310deg,
                rgba(16, 185, 129, 0.95) 358deg,
                transparent 360deg
            );
            filter: blur(16px);
            animation: orbit-glow 2.6s linear infinite;
            z-index: 1;
        }
        @keyframes orbit-glow {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 6px;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        h1 .k { color: #3a7d44; }

        .tagline {
            font-family: 'Poppins', sans-serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: #f5f1e8;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }

        .mission {
            font-size: 1.05rem;
            line-height: 1.7;
            max-width: 550px;
            margin: 0 auto 2rem auto;
            color: #f0f0f0;
        }

        .members {
            font-size: 0.95rem;
            color: #f5f1e8;
            margin-bottom: 2.5rem;
        }
        .members span {
            display: inline-block;
            margin: 0 0.6rem;
        }

        .loader {
            width: 55px;
            height: 55px;
            border: 5px solid rgba(255, 255, 255, 0.25);
            border-top: 5px solid #3a7d44;
            border-radius: 50%;
            margin: 0 auto 1.5rem auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .countdown {
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            color: #f5f1e8;
        }
        .countdown span {
            font-size: 1.4rem;
            font-weight: 700;
            color: #3a7d44;
        }

        .skip-btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: #3a7d44;
            color: #ffffff;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }
        .skip-btn:hover {
            background: #2c6e9c;
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.6rem; letter-spacing: 3px; }
            .tagline { font-size: 1rem; }
            .mission { font-size: 0.95rem; }
        }
    </style>
</head>

<body>

    <div class="splash">

        <div class="logo-orbit">
            <img src="images/logo.png" alt="SPARK logo">
        </div>

        <h1>SPAR<span class="k">K</span></h1>

        <p class="tagline">Keep the green, save the scene.</p>

        <p class="mission">
            SPARK is a movement for climate action. Driven by small everyday choices for a planet
             that lasts longer than we do.
        </p>

        <p class="members">
            <span>Anjana Dodammullage</span>.
            <span>Yohan Singappulige</span>.
            <span>Krishen Silva</span>.
            <span>Sithil Hettiarachchi</span>
        </p>

        <div class="loader"></div>

        <p class="countdown">Entering site in <span id="count">4</span>...</p>

        <a href="home.html" class="skip-btn">Skip Intro</a>

    </div>

    <script>
        let count = 4;
        const countEl = document.getElementById('count');

        const timer = setInterval(function() {
            count = count - 1;
            countEl.textContent = count;
            if (count <= 0) {
                clearInterval(timer);
            }
        }, 1000);
    </script>

</body>
</html>
